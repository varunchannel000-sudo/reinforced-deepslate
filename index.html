<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinforced Deepslate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.5.1/confetti.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f5f5f5;
        }

        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
            margin-bottom: 30px;
            display: none;
        }

        .header.active {
            display: block;
        }

        .header-flex {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .logout-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #1a1a1a;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            padding: 50px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            max-width: 420px;
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }

        .login-card .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #333;
        }

        .sign-in-btn {
            width: 100%;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .sign-in-btn:hover {
            background: #1a1a1a;
        }

        .sign-in-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 15px;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
            display: none;
        }

        .welcome-container {
            display: none;
        }

        .welcome-container.active {
            display: block;
        }

        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 30px;
            text-align: center;
        }

        .welcome-card h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #333;
        }

        .welcome-card p {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .status-section {
            margin: 40px 0;
        }

        .status-box {
            padding: 30px;
            border-radius: 8px;
            border: 2px solid;
            margin: 30px 0;
            text-align: center;
        }

        .status-box.admission {
            background: #e8f5e9;
            border-color: #2e7d32;
            color: #1b5e20;
        }

        .status-box.deferral {
            background: #fff3e0;
            border-color: #f57c00;
            color: #e65100;
        }

        .status-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-description {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .view-letter-btn {
            background: #333;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .view-letter-btn:hover {
            background: #1a1a1a;
        }

        .view-letter-btn:active {
            transform: scale(0.98);
        }

        .letter-section {
            display: none;
        }

        .letter-section.show {
            display: block;
        }

        .letter-card {
            background: white;
            padding: 50px;
            border-radius: 8px;
            border: 1px solid #ddd;
            line-height: 1.8;
        }

        .letter-header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .letter-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .letter-header p {
            font-size: 12px;
            color: #666;
        }

        .letter-info {
            margin: 30px 0;
            font-size: 14px;
        }

        .letter-date {
            font-size: 13px;
            color: #666;
            margin: 20px 0 30px 0;
        }

        .letter-body p {
            margin-bottom: 15px;
            text-align: justify;
            color: #333;
        }

        .letter-closing {
            margin-top: 50px;
        }

        .signature-space {
            height: 60px;
        }

        .back-btn {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
            }

            .letter-card {
                padding: 30px 20px;
            }

            .welcome-card {
                padding: 30px 20px;
            }

            .login-card h1 {
                font-size: 24px;
            }

            .welcome-card h1 {
                font-size: 24px;
            }

            .status-box {
                padding: 20px;
            }

            .status-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="header" id="header">
    <div class="header-flex">
        <div class="logo">Reinforced Deepslate</div>
        <button class="logout-btn" onclick="logoutFunc()">Log Out</button>
    </div>
</div>

<div class="login-container" id="loginSection">
    <div class="login-card">
        <h1>Reinforced Deepslate</h1>
        <p class="subtitle">Application Status Portal</p>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="emailField" placeholder="your.email@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="passwordField" placeholder="••••••••">
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <button class="sign-in-btn" onclick="signInFunc()">Sign In</button>
    </div>
</div>

<div class="welcome-container" id="welcomeSection">
    <div class="container">
        <div class="welcome-card">
            <h1 id="welcomeText"></h1>
            <p>Your application status has been updated</p>

            <div class="status-section" id="statusSection">
                <div class="status-box" id="statusBox">
                    <div class="status-title" id="statusTitle"></div>
                    <div class="status-description" id="statusDescription"></div>
                    <button class="view-letter-btn" onclick="viewLetter()">View Letter</button>
                </div>
            </div>
        </div>

        <div class="letter-section" id="letterSection">
            <div class="letter-card" id="letterContent"></div>
            <button class="back-btn" onclick="backToStatus()">← Back to Status</button>
        </div>
    </div>
</div>

<script>
    const accounts = {
        'naunidhbhushan@gmail.com': {
            pass: 'capybara123',
            name: 'Naunidh',
            type: 'admission'
        },
        'vathukrishnaswamy@gmail.com': {
            pass: 'gray10Five',
            name: 'Varun',
            type: 'admission'
        },
        'abhaykrishnan@gmail.com': {
            pass: 'cheetahrules123!',
            name: 'Abhay',
            type: 'deferral'
        }
    };

    let currentUser = null;

    function signInFunc() {
        const email = document.getElementById('emailField').value;
        const password = document.getElementById('passwordField').value;
        const errorBox = document.getElementById('errorMsg');

        if (accounts[email] && accounts[email].pass === password) {
            currentUser = {
                email: email,
                name: accounts[email].name,
                type: accounts[email].type
            };

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('welcomeSection').classList.add('active');
            document.getElementById('header').classList.add('active');

            displayWelcome();
            launchConfetti();
        } else {
            errorBox.textContent = 'Invalid email or password';
            errorBox.style.display = 'block';
        }
    }

    function logoutFunc() {
        currentUser = null;
        document.getElementById('loginSection').style.display = 'flex';
        document.getElementById('welcomeSection').classList.remove('active');
        document.getElementById('header').classList.remove('active');
        document.getElementById('emailField').value = '';
        document.getElementById('passwordField').value = '';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('letterSection').classList.remove('show');
        document.getElementById('statusSection').style.display = 'block';
    }

    function displayWelcome() {
        const name = currentUser.name;
        const type = currentUser.type;

        document.getElementById('welcomeText').textContent = 'Welcome, ' + name;

        if (type === 'admission') {
            document.getElementById('statusBox').classList.remove('deferral');
            document.getElementById('statusBox').classList.add('admission');
            document.getElementById('statusTitle').textContent = '✓ Admission Letter';
            document.getElementById('statusDescription').textContent = 'Congratulations! A new admission letter to your application at Reinforced Deepslate has been posted to your account.';
        } else {
            document.getElementById('statusBox').classList.remove('admission');
            document.getElementById('statusBox').classList.add('deferral');
            document.getElementById('statusTitle').textContent = '⏳ Application Deferred';
            document.getElementById('statusDescription').textContent = 'A deferral letter to your application at Reinforced Deepslate has been posted to your account.';
        }
    }

    function viewLetter() {
        const name = currentUser.name;
        const type = currentUser.type;
        const email = currentUser.email;

        document.getElementById('statusSection').style.display = 'none';
        document.getElementById('letterSection').classList.add('show');

        createLetter(name, type, email);
    }

    function backToStatus() {
        document.getElementById('letterSection').classList.remove('show');
        document.getElementById('statusSection').style.display = 'block';
    }

    function createLetter(name, type, email) {
        const dateObj = new Date();
        const date = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        let html = '<div class="letter-header"><h2>Reinforced Deepslate</h2><p>Office of Admissions</p></div>';
        html += '<div class="letter-info"><div style="font-weight: 500;">' + name + '</div><div>' + email + '</div></div>';
        html += '<div class="letter-date">' + date + '</div>';
        html += '<div class="letter-body">';

        if (type === 'admission') {
            html += '<p>Dear ' + name + ',</p>';
            html += '<p>Congratulations, and welcome to Reinforced Deepslate We are pleased to offer you admission to the Technology Committee program for the fall year of 2026. </p>';
            html += '<p>, Your remarkable achievements both inside and outside the classroom made you stand tall amongst more than 133,000 applicants to the nations leading public university. You, your loved ones, and supporters along the way have every reason to be proud of your success!';
            html += '<p> Once agian, congratulations, and we hope you decide to commit.</p>';
        } else {
            html += '<p>Dear ' + name + ',</p>';
            html += '<p>Thank you for your application to Reinforced Deepslate. The admissions committee has carefully reviewed your credentials and academic record. While your application demonstrates strong qualities, we have decided to DEFER a final decision on your admission at this time.</p>';
            html += '<p>This deferral reflects the exceptional competitiveness of the applicant pool rather than any deficiency in your qualifications. We would like to learn more about your continued achievements and involvement during the remainder of your academic career before making a final determination.</p>';
            html += '<p>We encourage you to update us on any significant academic or personal developments that have occurred since you submitted your application. Additional information may strengthen your candidacy as we continue our evaluation process.</p>';
            html += '<p>We will make a final decision on your application by the conclusion of the regular admissions cycle. You will be notified of our decision via mail and email. In the meantime, we encourage you to maintain contact with our admissions office if you have any questions.</p>';
            html += '<p>Thank you for your interest in Reinforced Deepslate. We appreciate the opportunity to consider your application.</p>';
        }

        html += '</div>';
        html += '<div class="letter-closing"><div class="signature-space"></div><p><strong>Sincerely,</strong></p><p>Office of Admissions<br>Reinforced Deepslate</p></div>';

        document.getElementById('letterContent').innerHTML = html;
    }

    function launchConfetti() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
        });
    }
</script>

</body>
</html>
